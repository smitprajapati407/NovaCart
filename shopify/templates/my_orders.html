{% extends 'base.html' %}

{% block content %}

<h1>My Orders</h1>

<table class="table">

    <tr>
        <th>Order ID</th>
        <th>Total</th>
        <th>Status</th>
        <th>Date</th>
        <th></th>
    </tr>

    {% for order in orders %}

    <tr>

        <td>
            {{ order.id }}
        </td>

        <td>
            ₹{{ order.total_price }}
        </td>

        <td>
            {{ order.status }}
        </td>

        <td>
            {{ order.created_at }}
        </td>

        <td>

    <div class="order-actions">

        <a href="{% url 'order_detail_user' order.id %}"
           class="view-btn">

            <i class="fas fa-eye"></i>

            View

        </a>

        <a href="{% url 'download_invoice' order.id %}"
           class="invoice-btn">

            <i class="fas fa-file-invoice"></i>

            Invoice

        </a>

    </div>

</td>

    </tr>

    {% empty %}

    <tr>

        <td colspan="5">
            No Orders Yet
        </td>

    </tr>

    {% endfor %}

</table>

{% endblock %}
