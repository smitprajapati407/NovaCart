{% extends 'dashboard_base.html' %}

{% block content %}

<div class="card shadow p-4">

<h2 class="mb-4">

    Add Product

</h2>

<form
    method="POST"
    enctype="multipart/form-data">

    {% csrf_token %}

    {{ form.as_p }}

    <button
        type="submit"
        class="btn btn-success">

        Add Product

    </button>

</form>


</div>

{% endblock %}
