{% extends 'base.html' %}

{% block content %}

<h1>
    Order #{{ order.id }}
</h1>

<p>
    <strong>Status:</strong>
    {{ order.status }}
</p>

<p>
    <strong>Total:</strong>
    ₹{{ order.total_price }}
</p>

<table class="table">

    <tr>

        <th>Product</th>
        <th>Quantity</th>
        <th>Price</th>

    </tr>

    {% for item in order.items.all %}

    <tr>

        <td>
            {{ item.product.name }}
        </td>

        <td>
            {{ item.quantity }}
        </td>

        <td>
            ₹{{ item.price }}
        </td>

    </tr>

    {% endfor %}

</table>

{% endblock %}
